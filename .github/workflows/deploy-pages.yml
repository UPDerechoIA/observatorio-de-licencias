name: Deploy to GitHub Pages

on:
  # Publica el visor estático en cada push a main.
  push:
    branches: [main]
  # Permite lanzarlo a mano desde la pestaña Actions.
  workflow_dispatch:

# Permisos que exige actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola publicación a la vez; no cancela una en curso (evita dejar el sitio a medias).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site (./out)
        run: bash scripts/build-static.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
